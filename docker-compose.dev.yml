# Development stack with hot reload for both backend and frontend.
# Reuses the production image (`make build`) for the backend's Python deps, then
# mounts the source over it and runs uvicorn --reload. The frontend runs Vite's
# dev server (HMR). Both share ./data so the SQLite db + tokens persist — you only
# sync once.
#
#   make dev        # start both, hot-reloading
#   open http://localhost:5173
services:
  backend:
    image: garmin-dash # built by the prod Dockerfile via `make build`
    command: uvicorn server.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATA_DIR: /data
    volumes:
      - ./server:/app/server # live source → uvicorn reloads on change
      - ./data:/data # persist db + raw .fit + garth tokens
    restart: unless-stopped

  web:
    image: node:20-slim
    working_dir: /web
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8000 # proxy /api to the backend container
    volumes:
      - ./web:/web # live source → Vite HMR
      - web_node_modules:/web/node_modules # keep deps out of the host mount
    depends_on:
      - backend

volumes:
  web_node_modules:
